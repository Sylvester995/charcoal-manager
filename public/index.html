<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23e8621a'/><text y='75' x='18' font-size='72' font-weight='900' font-family='Arial' fill='white'>C</text></svg>" />

    <!-- PWA essentials -->
    <meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover,
      user-scalable=no" />
    <meta name="theme-color" content="#161410" />
    <meta name="background-color" content="#0c0b09" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style"
      content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Charcoal" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO / description -->
    <meta name="description"
      content="Charcoal business tracker for production, sales and profit management in Liberia" />
    <meta name="application-name" content="Charcoal Manager" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Charcoal Manager</title>

    <style>
      /* Prevent flash of white on load */
      html, body, #root {
        background-color: #0c0b09;
        margin: 0;
        padding: 0;
      }
      /* iOS safe area support */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <noscript>
      You need to enable JavaScript to run Charcoal Manager.
    </noscript>
    <div id="root"></div>
  </body>
</html>
